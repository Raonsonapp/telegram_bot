name: Bootstrap Flutter Project

on:
  workflow_dispatch:

permissions:
  contents: write   # ← муҳим

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'

      - name: Create Flutter project
        run: |
          flutter create raonson
          cp -r lib raonson/lib || true
          cp pubspec.yaml raonson/pubspec.yaml || true

      - name: Commit Flutter structure
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add raonson
          git commit -m "chore: bootstrap flutter project"
          git push
