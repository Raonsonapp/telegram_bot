name: Raonson CI – Fix & Validate

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  fix_and_check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          channel: stable

      - name: Bootstrap Flutter project (if needed)
        run: |
          if [ ! -d "android" ]; then
            flutter create .
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Dart auto-fix (safe fixes)
        run: dart fix --apply || true

      - name: Format code
        run: dart format .

      - name: Analyze project
        run: flutter analyze

      - name: Commit auto-fixes (if any)
        run: |
          git config --global user.name "raonson-ci"
          git config --global user.email "ci@raonson.app"
          git add .
          git diff --cached --quiet || git commit -m "ci: auto fix & format"
          git push || true
