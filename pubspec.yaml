name: raonson
description: Full social network app (Raonson v5)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ================= UI / BASE =================
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # ================= STATE / UTIL =================
  provider: ^6.1.2
  intl: ^0.19.0
  collection: ^1.18.0

  # ================= STORAGE / SESSION =================
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # ================= NETWORK =================
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ================= MEDIA =================
  image_picker: ^1.1.2
  video_player: ^2.8.6
  chewie: ^1.8.3
  photo_view: ^0.15.0

  # ================= REALTIME / SOCKET =================
  socket_io_client: ^2.0.3+1

  # ================= ANIMATION =================
  lottie: ^3.1.2

  # ================= PERMISSIONS =================
  permission_handler: ^11.3.1

  # ================= NOTIFICATIONS =================
  flutter_local_notifications: ^17.1.2

  # ================= FILE / UPLOAD =================
  mime: ^1.0.5
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
